name: ux-traceability-check
description: Verify UX traceability across functional docs, user docs, design/stitch exports, and pain-point matrix
when:
  type: fileEdited
  patterns:
    - "docs/functional/**/*.md"
    - "docs/user/**/*.md"
    - "knowledge/ux-stitch/**/*.md"
    - "design/stitch/**/*.md"
    - "PAIN_POINTS_TRACEABILITY.md"
then:
  type: askAgent
  prompt: |
    A UX-related or documentation file was just saved: {{file}}

    Determine whether this change affects user-facing behavior, guided flows, help content,
    validation messages, or pain-point mitigation (PP-A through PP-M).

    If the file is under design/stitch/exports/<screen-name>/, also check:
    - Is the traceability.md for this screen up to date?
    - Does the screen's metadata.json status field reflect the current state?
    - If screen.html was updated, has the ui5-fiori-bridge agent been notified?

    If it does affect traceability, verify coherence across all four documents:
    1. docs/functional/master-functional-design.md
       Is the functional design pattern for this area still current?
    2. docs/user/master-user-manual.md
       Does the user guidance reflect the change?
    3. knowledge/ux-stitch/README.md
       Are the UX artifact linked-requirement fields still valid?
    4. PAIN_POINTS_TRACEABILITY.md
       Are the Epic/Story/Design/Tasks columns for the relevant PP-IDs still accurate?

    If a mismatch, missing cross-reference, or uncovered PP-ID is detected,
    state exactly which file and section needs updating.

    If the change does not affect UX traceability, or if everything is consistent, output:
    "UX traceability consistent - no update needed."
    Do not elaborate beyond that single line when no action is required.
